<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tarot · milk</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<main class="stage">

  <div class="screens">

    <section id="screen-home" class="screen screen-home is-active">
      <header class="home-top">
        <div class="home-hello">
          <div class="home-greeting" id="home-greeting">欢迎光临</div>
          <div class="home-sub">亲爱的女巫</div>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
          <svg class="ico-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="ico-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </header>

      <div class="home-brand">
        <svg viewBox="0 0 80 80" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="40" cy="40" r="32"/>
          <path d="M40 14 L46 34 L66 34 L50 46 L56 66 L40 54 L24 66 L30 46 L14 34 L34 34 Z"/>
        </svg>
        <div class="home-brand-name">TAROT&nbsp;·&nbsp;MILK</div>
        <div class="home-brand-tag">a quiet deck of seventy-nine</div>
      </div>

      <nav class="app-grid">
        <button class="app-tile" data-app="cards" style="--d:0">
          <span class="app-icon">
            <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="5" width="14" height="22" rx="2"/>
              <path d="M13 11h6M13 16h6M13 21h4"/>
            </svg>
          </span>
          <span class="app-name">牌库</span>
          <span class="app-tag">Library</span>
        </button>
        <button class="app-tile" data-app="exam" style="--d:1">
          <span class="app-icon">
            <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="5" width="20" height="22" rx="2"/>
              <path d="M11 13l3 3 6-6M11 21h10"/>
            </svg>
          </span>
          <span class="app-name">练习</span>
          <span class="app-tag">Practice</span>
        </button>
        <button class="app-tile" data-app="reading" style="--d:2">
          <span class="app-icon">
            <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="16" cy="16" r="11"/>
              <path d="M16 8v8l5 3"/>
              <circle cx="16" cy="16" r="1.2" fill="currentColor"/>
            </svg>
          </span>
          <span class="app-name">占卜</span>
          <span class="app-tag">Reading</span>
        </button>
        <button class="app-tile" data-app="notes" style="--d:3">
          <span class="app-icon">
            <svg viewBox="0 0 32 32" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 4H8a2 2 0 0 0-2 2v20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V11z"/>
              <path d="M19 4v7h7M11 17h10M11 21h7"/>
            </svg>
          </span>
          <span class="app-name">笔记</span>
          <span class="app-tag">Notes</span>
        </button>
      </nav>

      <footer class="home-foot">
        <span class="home-foot-line"></span>
        <span class="home-foot-text">silence · cards · the long night</span>
        <span class="home-foot-line"></span>
      </footer>
    </section>

    <section id="screen-cards" class="screen screen-app"></section>
    <section id="screen-exam" class="screen screen-app"></section>
    <section id="screen-reading" class="screen screen-app"></section>
    <section id="screen-notes" class="screen screen-app"></section>
  </div>
</main>

<div id="card-modal" class="card-modal"></div>

<script src="js/data.js"></script>
<script src="js/core.js"></script>
<script src="js/app-cards.js"></script>
<script src="js/app-exam.js"></script>
<script src="js/app-reading.js"></script>
<script src="js/app-notes.js"></script>
<script>Core.init();</script>

</body>
</html>
