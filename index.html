<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tarot · milk</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="phone">

  <div class="status-bar">
    <span class="status-time" id="status-time">10:24</span>
    <span class="status-icons">
      <svg viewBox="0 0 18 12" width="17" height="11"><path d="M1 9h2v2H1zM5 7h2v4H5zM9 5h2v6H9zM13 3h2v8h-2z" fill="currentColor"/></svg>
      <svg viewBox="0 0 16 12" width="15" height="11"><path d="M8 11.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3zM3.5 7.7a6.3 6.3 0 0 1 9 0L11 9.4a4 4 0 0 0-6 0L3.5 7.7zM.7 4.9a10.3 10.3 0 0 1 14.6 0L13.8 6.4a8.2 8.2 0 0 0-11.6 0L.7 4.9z" fill="currentColor"/></svg>
      <svg viewBox="0 0 26 12" width="24" height="11"><rect x="1" y="1" width="22" height="10" rx="2.5" fill="none" stroke="currentColor" stroke-width="1"/><rect x="3" y="3" width="18" height="6" rx="1" fill="currentColor"/><rect x="24" y="4" width="1.5" height="4" rx="0.5" fill="currentColor"/></svg>
    </span>
  </div>

  <div class="screens">

    <section id="screen-home" class="screen screen-home is-active">
      <div class="home-top">
        <div>
          <div class="home-greeting" id="home-greeting">欢迎光临</div>
          <div class="home-sub">小女巫</div>
        </div>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换主题">
          <svg class="ico-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          <svg class="ico-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <div class="app-grid">
        <button class="app-tile" data-app="cards">
          <span class="app-icon icon-cards">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="6" y="3" width="12" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
          </span>
          <span class="app-name">牌库</span>
        </button>
        <button class="app-tile" data-app="exam">
          <span class="app-icon icon-exam">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9 12l2 2 4-4"/><rect x="4" y="3" width="16" height="18" rx="2"/></svg>
          </span>
          <span class="app-name">练习</span>
        </button>
        <button class="app-tile" data-app="reading">
          <span class="app-icon icon-reading">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          </span>
          <span class="app-name">占卜</span>
        </button>
        <button class="app-tile" data-app="notes">
          <span class="app-icon icon-notes">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6M8 13h8M8 17h5"/></svg>
          </span>
          <span class="app-name">笔记</span>
        </button>
      </div>

      <div class="home-foot">
        <span>🤍</span>
      </div>
    </section>

    <section id="screen-cards" class="screen screen-app"></section>
    <section id="screen-exam" class="screen screen-app"></section>
    <section id="screen-reading" class="screen screen-app"></section>
    <section id="screen-notes" class="screen screen-app"></section>
  </div>
</div>

<div id="card-modal" class="card-modal"></div>

<script src="js/data.js"></script>
<script src="js/core.js"></script>
<script src="js/app-cards.js"></script>
<script src="js/app-exam.js"></script>
<script src="js/app-reading.js"></script>
<script src="js/app-notes.js"></script>
<script>Core.init();</script>

</body>
</html>
